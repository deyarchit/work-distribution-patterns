version: "2" # Triggers v2 config format validation.

linters:
  # Opt-in mode: only explicitly listed linters run (avoids surprise breakage when
  # golangci-lint adds new linters in a future release).
  default: none

  enable:
    # ── Correctness ──────────────────────────────────────────────────────────
    - errcheck # Flags unhandled error return values; the #1 source of silent failures in Go.
    - govet # Runs go vet analysers (e.g. printf format mismatches, unreachable code, etc.).
    - staticcheck # Comprehensive static analysis suite; v2 absorbed the old gosimple linter.
    - ineffassign # Detects assignments whose result is never read before being overwritten.
    - unused # Flags unexported identifiers (types, funcs, consts) that are never referenced.
    - nilerr # Catches `if err != nil { return nil }` — returning nil hides real errors.
    - errorlint # Enforces errors.Is/As instead of == and type assertions; required for wrapped errors.
    - bodyclose # Ensures http.Response.Body is closed; unclosed bodies leak goroutines/connections.
    - durationcheck # Catches time.Duration * time.Duration multiplications (usually a unit bug).

    # ── Security & Safety ────────────────────────────────────────────────────
    # - gosec # Security scanner for SQLi, weak crypto, etc.
    - copyloopvar # Essential for Go 1.22 loop variable safety.

    # ── Clean Code & Performance ─────────────────────────────────────────────
    - revive # Advanced replacement for golint.
    - gocritic # Diagnostic and performance checks.
    # - perfsprint # Suggests faster alternatives to fmt.Sprintf.
    - unparam # Flags unused function parameters.

    # ── Style / simplification ───────────────────────────────────────────────
    - unconvert # Removes redundant type conversions (e.g. int(someInt)).
    - unparam # Flags function parameters that always receive the same constant argument.
    - misspell # Corrects common English spelling mistakes in comments and string literals.

  settings:
    errcheck:
      check-type-assertions: true # Flag `x.(T)` when the second (ok) return value is discarded.
      check-blank: true # Flag `_ = f()` when f returns an error.
    govet:
      enable:
        - shadow # Report variables in inner scopes that shadow an outer-scope variable.
    errorlint:
      errorf: true # Require %w (not %v) in fmt.Errorf.
      asserts: true # Disallow direct type assertions on error values.
      comparison: true # Disallow err == ErrFoo; use errors.Is.
    gosec:
      excludes:
        - G104 # Duplicates errcheck; safe to disable to reduce noise
        - G115 # Integer overflow (can be very noisy, enable only if you do heavy math)
    revive:
      rules:
        - name: var-naming # Enforces proper initialisms (URL vs Url, API vs Api)
        - name: indent-error-flow # Flags 'else' after a return; keeps code flat
        - name: context-as-argument # Ensures Context is always the first param

formatters:
  enable:
    - gofmt # Standard Go formatter; enforces canonical indentation and brace style.
    - goimports # Superset of gofmt: also groups and sorts import blocks.

issues:
  max-issues-per-linter: 0 # Remove the default cap (10) so every issue is reported.
  max-same-issues: 0 # Remove the default cap (3) on identical messages.
