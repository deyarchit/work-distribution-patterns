{{define "index.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Distribution Patterns</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .form-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #cbd5e1;
    }
    .form-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      flex: 1;
      min-width: 160px;
    }
    label {
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 500;
    }
    input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    button[type="submit"] {
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1.5rem;
      transition: background 0.15s;
      align-self: flex-end;
    }
    button[type="submit"]:hover { background: #4f46e5; }
    .tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .tasks-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #cbd5e1;
    }
    #sse-status {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
    }
    #sse-status.connected { background: #14532d; color: #4ade80; }
    #sse-status.disconnected { background: #450a0a; color: #f87171; }
    #task-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #475569;
      font-size: 0.9rem;
    }

    /* Task card */
    .task-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .task-card.running { border-color: #6366f1; }
    .task-card.completed { border-color: #16a34a; }
    .task-card.failed { border-color: #dc2626; }
    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .task-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .task-meta {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.125rem;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.pending   { background: #1e3a5f; color: #93c5fd; }
    .badge.running   { background: #312e81; color: #a5b4fc; }
    .badge.completed { background: #14532d; color: #4ade80; }
    .badge.failed    { background: #450a0a; color: #f87171; }

    /* Progress bar */
    .task-progress {
      height: 6px;
      background: #0f172a;
      border-radius: 3px;
      margin-bottom: 0.625rem;
      overflow: hidden;
    }
    .task-progress-bar {
      height: 100%;
      background: #6366f1;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .task-card.completed .task-progress-bar { background: #16a34a; }
    .task-card.failed    .task-progress-bar { background: #dc2626; }

    /* Current stage label */
    .stage-label {
      font-size: 0.78rem;
      color: #64748b;
      min-height: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Work Distribution Patterns</h1>
    <p class="subtitle">Live task execution visualization</p>

    <div class="form-card">
      <h2>Submit Task</h2>
      <form
        hx-post="/tasks"
        hx-target="#task-list"
        hx-swap="afterbegin"
      >
        <div class="form-row">
          <div class="form-group">
            <label for="name">Task Name</label>
            <input type="text" id="name" name="name" placeholder="My task" required>
          </div>
          <div class="form-group">
            <label for="stage_count">Stages (1–8)</label>
            <input type="number" id="stage_count" name="stage_count" value="3" min="1" max="8">
          </div>
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>

    <div class="tasks-header">
      <h2>Tasks</h2>
      <span id="sse-status" class="connected">● Ready</span>
    </div>
    <div id="task-list">
      <div class="empty-state">No tasks yet. Submit one above.</div>
    </div>
  </div>

  <script>
    // ── Per-task SSE connections ──────────────────────────────────────────────
    const taskConnections = new Map();

    function openTaskSSE(taskID) {
      if (taskConnections.has(taskID)) return;
      const es = new EventSource('/events?taskID=' + encodeURIComponent(taskID));
      es.onopen = () => updateSSEStatus(true);
      es.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'progress')     handleProgress(ev);
          else if (ev.type === 'task_status') handleTaskStatus(ev);
        } catch (err) { console.error('SSE parse error:', err); }
      };
      es.onerror = () => updateSSEStatus(taskConnections.size > 0);
      taskConnections.set(taskID, es);
    }

    function closeTaskSSE(taskID) {
      const es = taskConnections.get(taskID);
      if (!es) return;
      es.close();
      taskConnections.delete(taskID);
      if (taskConnections.size > 0) {
        updateSSEStatus(true);
      } else {
        // All tasks done — not an error, show ready
        const el = document.getElementById('sse-status');
        if (el) { el.textContent = '● Ready'; el.className = 'connected'; }
      }
    }

    function updateSSEStatus(connected) {
      const el = document.getElementById('sse-status');
      if (!el) return;
      el.textContent = connected ? '● Connected' : '● Disconnected';
      el.className = connected ? 'connected' : 'disconnected';
    }

    // ── SSE handlers — UPDATE ONLY, never create cards ───────────────────────
    // Cards are created exclusively by HTMX from the POST /tasks response.
    // If a card isn't in the DOM yet (SSE arrived before HTMX response),
    // we simply skip — htmx:afterSwap will sync state once HTMX inserts it.

    function handleProgress(ev) {
      const card = document.getElementById('task-' + ev.taskID);
      if (!card) return;
      const bar = card.querySelector('.task-progress-bar');
      if (bar) bar.style.width = ev.progress + '%';
      const label = card.querySelector('.stage-label');
      if (label && ev.stageName) label.textContent = ev.stageName;
    }

    function handleTaskStatus(ev) {
      const card = document.getElementById('task-' + ev.taskID);
      if (!card) return;
      card.className = 'task-card ' + ev.status;
      const badge = card.querySelector('.badge');
      if (badge) { badge.className = 'badge ' + ev.status; badge.textContent = ev.status; }
      if (ev.status === 'completed') {
        const bar = card.querySelector('.task-progress-bar');
        if (bar) bar.style.width = '100%';
        const label = card.querySelector('.stage-label');
        if (label) label.textContent = '';
      }
      if (ev.status === 'completed' || ev.status === 'failed') {
        closeTaskSSE(ev.taskID);
      }
    }

    // ── After HTMX inserts a card, open a scoped SSE connection ──────────────
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (!evt.detail.target || evt.detail.target.id !== 'task-list') return;
      const first = evt.detail.target.firstElementChild;
      if (!first || !first.id.startsWith('task-')) return;
      const taskID = first.id.replace('task-', '');
      openTaskSSE(taskID);
      syncCardState(taskID);
    });

    // Fetch current task state from server and apply it to the card.
    function syncCardState(taskID) {
      fetch('/tasks/' + taskID)
        .then(r => r.json())
        .then(task => {
          const card = document.getElementById('task-' + taskID);
          if (!card) return;
          card.className = 'task-card ' + task.status;
          const badge = card.querySelector('.badge');
          if (badge) { badge.className = 'badge ' + task.status; badge.textContent = task.status; }
          if (task.status === 'completed' || task.status === 'failed') {
            closeTaskSSE(taskID);
          }
        });
    }
    // No connectSSE() call — connections are opened per-task via htmx:afterSwap
  </script>
</body>
</html>
{{end}}

{{define "task-card"}}
<div class="task-card {{.Status}}" id="task-{{.ID}}">
  <div class="task-header">
    <div>
      <div class="task-name">{{.Name}}</div>
      <div class="task-meta">{{printf "%.8s" .ID}}… · {{.SubmittedAt.Format "15:04:05"}}</div>
    </div>
    <span class="badge {{.Status}}">{{.Status}}</span>
  </div>
  <div class="task-progress">
    <div class="task-progress-bar" style="width: 0%"></div>
  </div>
  <div class="stage-label"></div>
</div>
{{end}}
