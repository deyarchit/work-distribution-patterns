events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Docker's internal DNS resolver; re-resolve every 5 s so nginx sees
        # all healthy replicas rather than caching one IP at startup.
        resolver 127.0.0.11 valid=5s ipv6=off;

        # SSE connections — disable buffering, keep alive longer.
        # Using a variable for upstream forces nginx to use the resolver per
        # connection rather than caching a single IP at startup.
        location /events {
            set $upstream http://api:8080;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        location / {
            set $upstream http://api:8080;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
