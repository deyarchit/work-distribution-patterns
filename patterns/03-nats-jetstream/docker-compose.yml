services:
  nats:
    image: nats:latest
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring

  api:
    build:
      context: ../..
      dockerfile: patterns/03-nats-jetstream/Dockerfile.api
    environment:
      - ADDR=:8080
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    restart: on-failure
    deploy:
      replicas: 3

  worker:
    build:
      context: ../..
      dockerfile: patterns/03-nats-jetstream/Dockerfile.worker
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    restart: on-failure
    deploy:
      replicas: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
