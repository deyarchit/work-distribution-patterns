services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 3s
      timeout: 10s
      retries: 15
      start_period: 15s

  # Override manager to depend on kafka
  manager:
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - ADDR=:8081
      - BROKER_URL=kafka://
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgres://tasks:tasks@postgres:5432/tasks?sslmode=disable

  # Override api to depend on kafka
  api:
    depends_on:
      manager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - BROKER_URL=kafka://
      - KAFKA_BROKERS=kafka:9092

  # Override worker to depend on kafka
  worker:
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - BROKER_URL=kafka://
      - KAFKA_BROKERS=kafka:9092
