services:
  manager:
    build:
      context: ../..
      dockerfile: patterns/p03/Dockerfile.manager
    environment:
      - ADDR=:8081
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  api:
    build:
      context: ../..
      dockerfile: patterns/p03/Dockerfile.api
    environment:
      - ADDR=:8080
      - MANAGER_URL=http://manager:8081
    ports:
      - "8080:8080"
    depends_on:
      manager:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  worker:
    build:
      context: ../..
      dockerfile: patterns/p03/Dockerfile.worker
    environment:
      - MANAGER_URL=ws://manager:8081/ws/register
    depends_on:
      manager:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 3
