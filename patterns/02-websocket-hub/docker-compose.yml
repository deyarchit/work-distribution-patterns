services:
  api:
    build:
      context: ../..
      dockerfile: patterns/02-websocket-hub/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - ADDR=:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/tasks"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  worker:
    build:
      context: ../..
      dockerfile: patterns/02-websocket-hub/Dockerfile.worker
    environment:
      - API_URL=ws://api:8080/ws/register
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 3
